<!DOCTYPE html>
<html lang="es">

<head>
  <!-- CONFIGURACIÓN -->
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Login | RedLine Motorsports</title>
  <!-- CSS -->
  <link rel="stylesheet"
        href="css/login.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <!-- ICONOS -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- BOTÓN ATRÁS A PÁGINA PRINCIPAL -->
<a href="index.html"
   class="back-button">

  ← ATRÁS

</a>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENEDOR PRINCIPAL -->
<main class="login-wrapper">

  <!-- LOGO -->
  <img src="img/logo_blanco_ori.png"
       alt="Logo RedLine"
       class="logo">

  <!-- TÍTULO -->
  <h1>

    Inicia sesión en RedLine Motorsports

  </h1>

  <!-- LOGIN SOCIAL -->
  <div class="social-login">

    <button>

      <i class="fa-brands fa-google"></i>

    </button>

    <button>

      <i class="fa-brands fa-facebook-f"></i>

    </button>

    <button>

      <i class="fa-brands fa-apple"></i>

    </button>

    <button>

      <i class="fa-brands fa-microsoft"></i>

    </button>

  </div>

  <!-- DIVISOR -->
  <div class="divider">

    <span>o</span>

  </div>

  <!-- FORM -->
  <form>

    <!-- EMAIL O TEL -->
    <label>

      TELÉFONO O CORREO ELECTRÓNICO

    </label>

    <input type="email"
           placeholder="Ingresa tu tlf. o correo electrónico">

    <!-- PASSWORD -->
    <label>

      CONTRASEÑA

    </label>

    <input type="password"
           placeholder="Ingresa tu contraseña">

    <!-- CHECK -->
    <div class="remember">

      <input type="checkbox">

      <span>

        Mantener sesión iniciada

      </span>

    </div>

    <!-- BOTÓN -->
    <button type="submit"
            class="login-btn">

      INICIAR SESIÓN

    </button>

  </form>

  <!-- LINKS -->
  <div class="links">

    <!-- RECUPERAR -->
    <a href="recovery.html"
       class="forgot-link">

      ¿Olvidaste tu contraseña?

    </a>

    <!-- CREAR CUENTA -->
    <a href="register.html"
       class="register-btn">

      CREAR CUENTA

    </a>

  </div>

</main>

</body>

</html>
