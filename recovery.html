<!DOCTYPE html>
<html lang="es">

<head>
  <!-- CONFIGURACIÓN GENERAL -->
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | RedLine Motorsports</title>
  <!-- CSS PRINCIPAL -->
  <!-- login.css = estilos generales del login / recovery.css = estilos específicos del recovery -->
  <link rel="stylesheet"
        href="css/login.css">

  <link rel="stylesheet"
        href="css/recovery.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<!-- OVERLAY / EFECTO OSCURO -->
<div class="overlay"></div>

<!-- CONTENEDOR PRINCIPAL -->
<main class="login-wrapper recovery-layout">

  <!-- BOTÓN ATRÁS, REGRESA A LOGIN -->
  <a href="login.html"
     class="back-button">

    ← ATRÁS

  </a>

  <!-- LOGO -->
  <img src="img/logo_blanco_ori.png"
       alt="Logo RedLine"
       class="logo">

  <!-- TÍTULO -->
  <h1>

    Recuperación de contraseña

  </h1>

  <!-- TEXTO DESCRIPTIVO -->
  <p class="recovery-description">

    Escribe tu dirección de correo electrónico asociada
    a tu cuenta para recuperar el acceso.

  </p>

  <!-- FORMULARIO -->
  <form>

    <!-- LABEL -->
    <label>

      CORREO ELECTRÓNICO

    </label>

    <!-- INPUT EMAIL -->
    <input type="email"
           placeholder="Escribe tu correo electrónico"
           required>

    <!-- BOTÓN CONTINUAR -->
    <button type="submit"
            class="login-btn">

      CONTINUAR

    </button>

  </form>

  <!-- LINKS INFERIORES -->
  <div class="links">

    <a href=""
       class="forgot-link">

      ¿No recuerdas tu correo electrónico?

    </a>

  </div>

</main>

</body>

</html>
