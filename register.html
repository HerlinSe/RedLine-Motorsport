<!DOCTYPE html>
<html lang="es">

<head>

  <!-- CONFIGURACIÓN GENERAL -->
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta | RedLine Motorsports</title>

  <!-- CSS -->
  <link rel="stylesheet"
        href="css/login.css">

  <link rel="stylesheet"
        href="css/register.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <!-- ICONOS -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- CONTENEDOR PRINCIPAL -->
<main class="login-wrapper register-layout">

  <!-- BOTÓN ATRÁS -->
  <a href="login.html"
     class="back-button">

    ← ATRÁS

  </a>

  <!-- LOGO -->
  <img src="img/logo_blanco_ori.png"
       alt="Logo RedLine"
       class="logo">

  <!-- TÍTULO -->
  <h1>

    Crea tu cuenta RedLine

  </h1>

  <!-- TEXTO DESCRIPTIVO -->
  <p class="register-description">

    Usa una de tus cuentas existentes o empieza desde cero.

  </p>

  <!-- ICONOS DE REGISTRO SOCIAL -->
  <div class="social-login register-social">

    <button type="button">
      <i class="fa-brands fa-google"></i>
    </button>

    <button type="button">
      <i class="fa-brands fa-facebook-f"></i>
    </button>

    <button type="button">
      <i class="fa-brands fa-apple"></i>
    </button>

    <button type="button">
      <i class="fa-brands fa-microsoft"></i>
    </button>

  </div>

  <!-- DIVISOR -->
  <div class="divider">

    <span>o</span>

  </div>

  <!-- FORMULARIO DE REGISTRO -->
  <form>

    <!-- NOMBRE -->
    <label>

      NOMBRE COMPLETO

    </label>

    <input type="text"
           placeholder="Ingresa tu nombre completo"
           required>

    <!-- CORREO -->
    <label>

      CORREO ELECTRÓNICO

    </label>

    <input type="email"
           placeholder="Ingresa tu correo electrónico"
           required>

    <!-- TELÉFONO -->
    <label>

      TELÉFONO

    </label>

    <input type="tel"
           placeholder="Ingresa tu número de teléfono"
           required>

    <!-- CONTRASEÑA -->
    <label>

      CONTRASEÑA

    </label>

    <input type="password"
           placeholder="Crea una contraseña"
           required>

    <!-- CONFIRMAR CONTRASEÑA -->
    <label>

      CONFIRMAR CONTRASEÑA

    </label>

    <input type="password"
           placeholder="Confirma tu contraseña"
           required>

    <!-- BOTÓN CREAR CUENTA -->
    <button type="submit"
            class="login-btn">

      CREAR CUENTA

    </button>

  </form>

  <!-- LINK INICIAR SESIÓN -->
  <div class="links">

    <p class="login-text">

      ¿Ya tienes una cuenta?

      <a href="login.html"
         class="forgot-link">

        Iniciar sesión

      </a>

    </p>

  </div>

</main>

</body>

</html>
